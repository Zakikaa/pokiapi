<div class="framed">
<h2>Battle History</h2>
@for (entry of history; track entry.date) {
  <div class="framed">
    <div class="pokemon-card ">
      <h3>{{ entry.first }}</h3>
    </div>

    <div class="pokemon-card ">
      <img [src]="entry.second.sprite">
      <h3>{{ entry.second }}</h3>
    </div>

    <div class="pokemon-card">
      <h3>winner: {{ entry.winner }}</h3>
    </div>
s
    <p class="timestamp">{{ entry.timestamp }}</p>
  </div>
  }
</div>
